name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            pr_number="$PR_NUMBER"
          else
            pr_number="$ISSUE_NUMBER"
          fi

          pr_json=$(gh pr view "$pr_number" --repo "$REPO" --json number,headRefName,headRepositoryOwner,headRepository)
          head_ref=$(printf '%s' "$pr_json" | jq -r '.headRefName')
          head_owner=$(printf '%s' "$pr_json" | jq -r '.headRepositoryOwner.login')
          head_repo=$(printf '%s' "$pr_json" | jq -r '.headRepository.name')

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "head_repository=$head_owner/$head_repo" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repository }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}

            You are reviewing a pull request on DriftShield, a FastAPI + React/Vite application for AI agent drift detection and forensic analysis.

            Read the CLAUDE.md file in the repo root first for project specific conventions, architecture, and review priorities.
            Read the linked GitHub issue before judging whether the PR is complete.

            Review this PR with focus on:
            1. Correctness and regressions: logic bugs, missing edge cases, broken imports, stale references, API or CLI breakage
            2. OSS boundary and release safety: proprietary code leakage, sensitive docs or assets, accidental reintroduction of private features, hardcoded secrets
            3. Backend and data integrity: schema drift, migration gaps, persistence mismatches, API/schema mismatches, backend/frontend parity
            4. Frontend and browser behaviour: broken routes, dead navigation, missing loading or error states, dashboard usability regressions
            5. Tests and verification: missing or stale tests, weak coverage for changed behaviour, lack of browser verification when UI changed
            6. Documentation and workflow consistency: issue acceptance criteria not met, PR description gaps, instructions that no longer match the code

            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues with line references.
            Use `gh pr comment` for the top level summary.

            For the summary comment, structure it as:
            - Findings first, grouped by severity: blocking, important, minor
            - Short residual risks or verification gaps
            - One sentence overall assessment

            Do not rubber stamp. If the PR is clean, say so briefly. If it has problems, be specific about what and where. Prioritise bugs, regressions, boundary leaks, and missing verification over style nits.
