name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR review
        id: review
        run: |
          # Fetch base branch for diff
          git fetch origin ${{ github.event.pull_request.base.ref }}

          # Run the review script and capture output
          set +e
          REVIEW_OUTPUT=$(bash skills/pr-reviewer/scripts/review.sh 2>&1)
          REVIEW_EXIT=$?
          set -e

          echo "$REVIEW_OUTPUT"

          # Save output for the comment step
          {
            echo "REVIEW_OUTPUT<<REVIEW_EOF"
            echo "$REVIEW_OUTPUT"
            echo "REVIEW_EOF"
          } >> "$GITHUB_ENV"

          echo "exit_code=$REVIEW_EXIT" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = process.env.REVIEW_OUTPUT || 'Review script produced no output.';
            const exitCode = '${{ steps.review.outputs.exit_code }}';
            const icon = exitCode === '0' ? '✅' : '❌';

            const body = `${icon} **Automated PR Review**\n\n\`\`\`\n${output}\n\`\`\`\n\n<sub>Generated by pr-reviewer skill</sub>`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Automated PR Review') && c.body.includes('pr-reviewer skill')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on critical issues
        if: steps.review.outputs.exit_code == '1'
        run: |
          echo "Critical issues found in PR review. See comment for details."
          exit 1
