name: Issue Start Sync

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, reopened, ready_for_review, edited]
  issues:
    types: [assigned]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to move to In Progress
        required: true
        type: string
      issue_repo:
        description: Repository that owns the issue
        required: false
        default: demouser/driftshield-agentic
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync picked-up issue state
        env:
          CURRENT_TOKEN: ${{ github.token }}
          AUTOMATION_TOKEN: ${{ secrets.DRIFTSHIELD_AUTOMATION_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
          ISSUE_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_repo || github.repository }}
          ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REF_NAME: ${{ github.ref_name }}
          PROJECT_OWNER: demouser
          PROJECT_NUMBER: 4
        run: python3 .github/scripts/issue_start_sync.py
