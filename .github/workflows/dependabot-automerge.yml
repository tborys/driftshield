name: Dependabot Automerge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  # The sweep job un-sticks eligible PRs that fell behind main. Auto-merge
  # cannot complete while "require branches up to date" marks a PR BEHIND,
  # and nothing rebases it automatically, so queued PRs used to pile up.
  push:
    branches: [main]
  schedule:
    # Push events from GITHUB_TOKEN-driven merges do not trigger workflows,
    # so a cron tick guarantees the queue keeps draining regardless of who
    # (or what) merged last.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number || 'sweep' }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    if: |
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Check whether this Dependabot PR is eligible
        id: eligibility
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json title,body,files)
          printf '%s\n' "$pr_json" > "$RUNNER_TEMP/pr.json"

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          from pathlib import Path

          allowed_files = {
              "driftshield/frontend/package.json",
              "driftshield/frontend/package-lock.json",
              "driftshield/pyproject.toml",
              "driftshield/uv.lock",
          }

          pr = json.loads((Path(os.environ["RUNNER_TEMP"]) / "pr.json").read_text())
          files = [entry["path"] for entry in pr["files"]]
          files_ok = bool(files) and all(path in allowed_files for path in files)

          version_re = r"from\s+([0-9]+(?:\.[0-9]+){0,2})\s+to\s+([0-9]+(?:\.[0-9]+){0,2})"

          # Single bumps carry "from X to Y" in the title. Grouped bumps
          # (e.g. "bump vite, @tailwindcss/vite and @vitejs/plugin-react")
          # only list versions in the body as "Updates `pkg` from X to Y"
          # lines, so fall back to those. Every listed update must stay
          # within its major for the PR to be eligible.
          pairs = re.findall(version_re, pr["title"])
          if not pairs:
              pairs = [
                  m
                  for line in pr.get("body", "").splitlines()
                  if line.lstrip().startswith("Updates ")
                  for m in re.findall(version_re, line)
              ]

          def major(version: str) -> int:
              return int(version.split(".")[0])

          version_ok = bool(pairs) and all(major(a) == major(b) for a, b in pairs)

          print(f"eligible={'true' if files_ok and version_ok else 'false'}")
          PY

      - name: Enable PR auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if ! gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --merge; then
            echo "Auto-merge is not available yet; leaving the PR open for manual merge"
          fi

  rebase-behind:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Ask Dependabot to rebase queued PRs that fell behind main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Only PRs that already have auto-merge queued: eligibility was
          # decided by the enable-automerge job, so this sweep never widens
          # the merge policy. "@dependabot rebase" (rather than the
          # update-branch API) matters here: dependabot's own push retriggers
          # CI, while a GITHUB_TOKEN push would not, stranding the PR with
          # permanently pending required checks.
          gh pr list --repo "$REPO" --author "app/dependabot" --state open \
            --json number,autoMergeRequest --jq '.[] | select(.autoMergeRequest != null) | .number' |
          while read -r pr; do
            state=$(gh pr view "$pr" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)
            if [ "$state" = "BEHIND" ] || [ "$state" = "DIRTY" ]; then
              echo "PR #$pr is $state; requesting dependabot rebase"
              gh pr comment "$pr" --repo "$REPO" --body "@dependabot rebase"
            else
              echo "PR #$pr is $state; nothing to do"
            fi
          done
