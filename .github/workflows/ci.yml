name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driftshield
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        run: PYTHONPATH=src python -m pytest tests -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driftshield/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: driftshield/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    if: >
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.labels.*.name, ','), 'frontend') ||
      true
    defaults:
      run:
        working-directory: driftshield/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: driftshield/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Check for e2e tests
        id: check-tests
        run: |
          if ls tests/e2e/*.spec.ts 2>/dev/null | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No e2e tests found — skipping Playwright run"
          fi

      - name: Run Playwright tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npx playwright test --reporter=list
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: driftshield/frontend/playwright-report/
