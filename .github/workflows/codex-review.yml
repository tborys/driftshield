name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.user.type != 'Bot') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.actor != 'dependabot[bot]' &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@codex-actions'))
    concurrency:
      group: codex-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            pr_number="$PR_NUMBER"
          else
            pr_number="$ISSUE_NUMBER"
          fi

          pr_json=$(gh pr view "$pr_number" --repo "$REPO" --json \
            number,title,url,body,baseRefName,headRefName,closingIssuesReferences)
          linked_issue_number=$(printf '%s' "$pr_json" | jq -r '.closingIssuesReferences[0].number // empty')

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "base_ref=$(printf '%s' "$pr_json" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"
          echo "linked_issue_number=$linked_issue_number" >> "$GITHUB_OUTPUT"

          printf '%s\n' "$pr_json" > "$RUNNER_TEMP/pr-review.json"

          if [ -n "$linked_issue_number" ]; then
            gh issue view "$linked_issue_number" --repo "$REPO" --json \
              number,title,body,url,labels,state > "$RUNNER_TEMP/linked-issue.json"
          fi

      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ steps.pr.outputs.base_ref }} \
            +refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Write review context
        run: |
          set -euo pipefail

          mkdir -p .github/codex/context

          {
            echo "# Pull Request Context"
            echo
            echo "Base branch: ${{ steps.pr.outputs.base_ref }}"
            echo
            echo "Review the diff with:"
            echo "\`git diff origin/${{ steps.pr.outputs.base_ref }}...HEAD\`"
            echo
            echo "## Pull request"
            jq -r '
              "- Number: #\(.number)\n" +
              "- Title: \(.title)\n" +
              "- URL: \(.url)\n" +
              "- Body:\n\n" +
              ((.body // "_No PR body provided._") + "\n")
            ' "$RUNNER_TEMP/pr-review.json"

            if [ -f "$RUNNER_TEMP/linked-issue.json" ]; then
              echo
              echo "## Linked issue"
              jq -r '
                "- Number: #\(.number)\n" +
                "- Title: \(.title)\n" +
                "- State: \(.state)\n" +
                "- URL: \(.url)\n" +
                "- Labels: " +
                (if (.labels | length) == 0 then "_None_" else (.labels | map(.name) | join(", ")) end) +
                "\n- Body:\n\n" +
                ((.body // "_No issue body provided._") + "\n")
              ' "$RUNNER_TEMP/linked-issue.json"
            else
              echo
              echo "## Linked issue"
              echo "No linked issue was detected from the PR metadata."
            fi
          } > .github/codex/context/pr-review-context.md

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.md
          safety-strategy: drop-sudo
          sandbox: read-only

  post_feedback:
    runs-on: ubuntu-latest
    needs: review
    if: needs.review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create or update Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
          PR_NUMBER: ${{ needs.review.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-review -->';
            const heading = '### Codex review';
            const body = `${marker}\n${heading}\n\n${process.env.CODEX_FINAL_MESSAGE}`;

            const issue_number = Number(process.env.PR_NUMBER);
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.login === 'github-actions[bot]' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
