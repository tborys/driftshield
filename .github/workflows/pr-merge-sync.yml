name: PR Merge Sync

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to sync manually
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync linked issue state
        env:
          CURRENT_TOKEN: ${{ github.token }}
          AUTOMATION_TOKEN: ${{ secrets.DRIFTSHIELD_AUTOMATION_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || github.event.pull_request.number }}
          PROJECT_OWNER: demouser
          PROJECT_NUMBER: 4
        run: python3 .github/scripts/pr_merge_sync.py
